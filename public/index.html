<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Satellite Tracker</title>
  <!-- Set base URL before Cesium loads so workers resolve correctly -->
  <script>window.CESIUM_BASE_URL = 'https://cdn.cesium.com/cesiumjs/releases/1.114/Build/Cesium/';</script>
  <script src="https://cdn.cesium.com/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cdn.cesium.com/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #cesiumContainer { width: 100%; height: 100%; }
    #ui {
      position: absolute; top: 10px; right: 10px; width: 360px; max-height: 95vh;
      overflow-y: auto; background: rgba(8,14,25,.93); color: #e6eefc;
      padding: 12px; border-radius: 10px; z-index: 9; font-size: 13px;
    }
    #ui h3 { margin: 0 0 6px; font-size: 15px; }
    #ui h4 { margin: 10px 0 4px; font-size: 13px; color: #9fb1d8; }
    input, select, button {
      width: 100%; margin: 3px 0; padding: 6px 8px; border-radius: 6px;
      border: 1px solid #334; background: #0f1629; color: #e6eefc; font-size: 12px; box-sizing: border-box;
    }
    button { cursor: pointer; background: #1a2a4a; }
    button:hover { background: #253a60; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; }
    th, td { border-bottom: 1px solid #1e2d44; padding: 3px 4px; text-align: left; }
    tr:hover td { background: #142240; cursor: pointer; }
    .tiny { font-size: 11px; color: #9fb1d8; line-height: 1.5; }
    .legend { display: flex; gap: 8px; flex-wrap: wrap; font-size: 10px; margin: 4px 0; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 2px; }
    hr { border: none; border-top: 1px solid #1e2d44; margin: 8px 0; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="ui">
    <h3>&#x1F6F0; Live Satellite Tracker</h3>
    <div id="status" class="tiny">Initializing…</div>
    <div class="legend">
      <span><span class="dot" style="background:#00ff00"></span>Comms</span>
      <span><span class="dot" style="background:#00ffff"></span>Nav</span>
      <span><span class="dot" style="background:#ff4444"></span>Military</span>
      <span><span class="dot" style="background:#ffaa00"></span>EO</span>
      <span><span class="dot" style="background:#8888ff"></span>Science</span>
      <span><span class="dot" style="background:#ffff00"></span>Other</span>
      <span><span class="dot" style="background:#888888"></span>Debris</span>
    </div>
    <input id="filter" placeholder="Filter by name / country / type / category" />
    <select id="satSelect" size="1"></select>
    <button id="loadTrack">&#x1F310; Load Ground Track (100 min)</button>
    <button id="clearTrack">&#x2715; Clear Tracks</button>
    <hr/>
    <input id="obsLat" placeholder="Observer latitude" value="28.6139" />
    <input id="obsLon" placeholder="Observer longitude" value="77.2090" />
    <button id="predictPasses">&#x1F4C5; Predict 24 h Passes</button>
    <div id="passOut" class="tiny"></div>
    <hr/>
    <h4>Selected Satellite</h4>
    <div id="info" class="tiny">Click a marker on the globe.</div>
    <hr/>
    <h4>Catalog (<span id="catCount">0</span> shown)</h4>
    <table>
      <thead><tr><th>Name</th><th>Country</th><th>Type</th><th>Cat</th></tr></thead>
      <tbody id="catalog"></tbody>
    </table>
  </div>

<script>
// ── Cesium setup ────────────────────────────────────────────────
// Disable Cesium Ion so no access token is required
Cesium.Ion.defaultAccessToken = '';

const viewer = new Cesium.Viewer('cesiumContainer', {
  timeline:             false,
  animation:            false,
  baseLayerPicker:      false,
  geocoder:             false,
  homeButton:           false,
  sceneModePicker:      false,
  navigationHelpButton: false,
  selectionIndicator:   true,
  infoBox:              false,
  // Suppress the default Ion imagery layer (Cesium 1.104+)
  baseLayer:            false,
});

// Flat ellipsoid terrain — no Ion token required
viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();

// Free OpenStreetMap base imagery
viewer.imageryLayers.addImageryProvider(
  new Cesium.UrlTemplateImageryProvider({
    url:          'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    maximumLevel: 19,
    credit:       '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  })
);

// ── State ───────────────────────────────────────────────────────
const satEntities      = new Map();   // norad → Cesium entity
let   catalog          = [];
let   latestPositions  = [];
let   coverageCircle   = null;
const trackEntities    = [];

// ── DOM refs ────────────────────────────────────────────────────
const statusEl   = document.getElementById('status');
const filterEl   = document.getElementById('filter');
const selectEl   = document.getElementById('satSelect');
const catalogEl  = document.getElementById('catalog');
const catCountEl = document.getElementById('catCount');
const infoEl     = document.getElementById('info');
const passOutEl  = document.getElementById('passOut');

// ── Colour by category ──────────────────────────────────────────
function categoryColor(cat) {
  switch (cat) {
    case 'communication':     return Cesium.Color.LIME;
    case 'navigation':        return Cesium.Color.CYAN;
    case 'military':          return Cesium.Color.fromCssColorString('#ff4444');
    case 'earth_observation': return Cesium.Color.ORANGE;
    case 'scientific':        return Cesium.Color.fromCssColorString('#8888ff');
    case 'debris':            return Cesium.Color.fromCssColorString('#888888');
    default:                  return Cesium.Color.YELLOW;
  }
}

// ── Satellite upsert ────────────────────────────────────────────
function upsertSatellite(s) {
  const pos = Cesium.Cartesian3.fromDegrees(s.lon, s.lat, s.alt * 1000);
  if (!satEntities.has(s.satId)) {
    const e = viewer.entities.add({
      id:       `sat-${s.satId}`,
      name:     `${s.name} (${s.satId})`,
      position: pos,
      point: {
        pixelSize:    4,
        color:        categoryColor(s.category),
        outlineColor: Cesium.Color.BLACK,
        outlineWidth: 1,
      },
    });
    satEntities.set(s.satId, e);
  } else {
    satEntities.get(s.satId).position = pos;
  }
}

// ── Coverage circle ─────────────────────────────────────────────
function updateCoverageCircle(s) {
  if (!s) {
    if (coverageCircle) { viewer.entities.remove(coverageCircle); coverageCircle = null; }
    return;
  }
  const radiusM = (s.footprintKm || 0) * 1000;
  if (coverageCircle) {
    coverageCircle.position  = Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 0);
    coverageCircle.ellipse.semiMajorAxis = new Cesium.ConstantProperty(radiusM);
    coverageCircle.ellipse.semiMinorAxis = new Cesium.ConstantProperty(radiusM);
  } else {
    coverageCircle = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(s.lon, s.lat, 0),
      ellipse: {
        semiMajorAxis: radiusM,
        semiMinorAxis: radiusM,
        material:      Cesium.Color.CYAN.withAlpha(0.10),
        outline:       true,
        outlineColor:  Cesium.Color.CYAN.withAlpha(0.60),
        outlineWidth:  1,
        height:        0,
      },
    });
  }
}

// ── Satellite info panel ────────────────────────────────────────
function formatInfo(s) {
  return `<b>${s.name}</b> &nbsp;<span style="color:#9fb1d8">NORAD ${s.satId}</span><br/>
Lat <b>${s.lat.toFixed(2)}°</b>  Lon <b>${s.lon.toFixed(2)}°</b>  Alt <b>${s.alt.toFixed(1)} km</b><br/>
Velocity: <b>${(s.velocityKms || 0).toFixed(3)} km/s</b><br/>
Orbit: <b>${s.orbitClass}</b> &nbsp; Category: <b>${s.category}</b><br/>
Country: <b>${s.country || '—'}</b><br/>
Coverage radius: <b>${(s.footprintKm || 0).toFixed(1)} km</b> (≥20° elev.)<br/>
Overhead: ${(s.countries || []).slice(0, 6).join(', ') || 'Open ocean'}`;
}

// ── Ground track ─────────────────────────────────────────────────
document.getElementById('loadTrack').onclick = async () => {
  const norad = Number(selectEl.value);
  if (!norad) return;
  try {
    const res  = await fetch(`/api/ground-track?norad=${norad}&minutes=100&stepSec=60`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const pts  = data.points.map(p => Cesium.Cartesian3.fromDegrees(p.lon, p.lat, p.alt * 1000));
    trackEntities.push(viewer.entities.add({
      polyline: { positions: pts, width: 2, material: Cesium.Color.CYAN.withAlpha(0.8) },
    }));
  } catch (e) { infoEl.innerHTML = `Ground track error: ${e.message}`; }
};

document.getElementById('clearTrack').onclick = () => {
  while (trackEntities.length) viewer.entities.remove(trackEntities.pop());
};

// ── Pass prediction ──────────────────────────────────────────────
document.getElementById('predictPasses').onclick = async () => {
  const norad = Number(selectEl.value);
  const lat   = Number(document.getElementById('obsLat').value);
  const lon   = Number(document.getElementById('obsLon').value);
  if (!norad) { passOutEl.innerHTML = 'Select a satellite first.'; return; }
  passOutEl.innerHTML = 'Computing…';
  try {
    const res  = await fetch(`/api/passes?norad=${norad}&lat=${lat}&lon=${lon}&hours=24`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const rows = (data.passes || []).slice(0, 10);
    passOutEl.innerHTML = rows.length
      ? rows.map(p =>
          `<b>AOS</b> ${new Date(p.start).toLocaleTimeString()} &nbsp;`
        + `<b>LOS</b> ${new Date(p.end).toLocaleTimeString()}<br/>`
        + `Peak ${new Date(p.peakTs).toLocaleTimeString()} — ${p.peakDistanceKm.toFixed(0)} km away`
        ).join('<hr style="margin:4px 0">')
      : 'No passes found in 24 h.';
  } catch (e) { passOutEl.innerHTML = `Error: ${e.message}`; }
};

// ── Catalog rendering ────────────────────────────────────────────
function renderCatalog() {
  const q        = filterEl.value.toLowerCase();
  const filtered = catalog.filter(s =>
    `${s.name} ${s.country} ${s.object_type} ${s.category}`.toLowerCase().includes(q)
  ).slice(0, 500);

  catCountEl.textContent = filtered.length;
  catalogEl.innerHTML    = filtered.map(s =>
    `<tr data-id="${s.sat_id}"><td>${s.name}</td><td>${s.country || ''}</td>`
  + `<td>${s.object_type || ''}</td><td>${s.category}</td></tr>`
  ).join('');

  selectEl.innerHTML = filtered.slice(0, 1000).map(s =>
    `<option value="${s.sat_id}">${s.name} (${s.sat_id})</option>`
  ).join('');

  for (const tr of catalogEl.querySelectorAll('tr[data-id]')) {
    tr.onclick = () => {
      const id = Number(tr.dataset.id);
      const s  = latestPositions.find(p => p.satId === id);
      if (!s) return;
      infoEl.innerHTML = formatInfo(s);
      updateCoverageCircle(s);
      const ent = satEntities.get(id);
      if (ent) viewer.flyTo(ent);
    };
  }
}
filterEl.oninput = renderCatalog;

// ── Catalog fetch ────────────────────────────────────────────────
async function loadCatalog() {
  const res  = await fetch('/api/catalog');
  if (!res.ok) throw new Error(`Catalog HTTP ${res.status}`);
  const data = await res.json();
  catalog    = data.satellites || [];
  renderCatalog();
  statusEl.textContent = `${data.count} satellites loaded | Updated ${data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString() : '—'}`;
}

// ── WebSocket stream ─────────────────────────────────────────────
function startSocket() {
  const proto  = location.protocol === 'https:' ? 'wss' : 'ws';
  const socket = new WebSocket(`${proto}://${location.host}/ws`);

  // If Vercel (no WS server) the connection will time out; fallback to polling
  const timer = setTimeout(() => socket.close(), 6000);

  socket.onopen  = () => { clearTimeout(timer); appendStatus('WS ✓'); };
  socket.onclose = () => startPollingFallback();
  socket.onerror = () => { clearTimeout(timer); startPollingFallback(); };

  socket.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type !== 'positions') return;
    latestPositions = msg.positions;
    msg.positions.forEach(upsertSatellite);

    // Keep coverage circle in sync with moving satellite
    if (coverageCircle) {
      const ent = viewer.selectedEntity;
      if (ent) {
        const m = /^sat-(\d+)$/.exec(ent.id || '');
        if (m) {
          const s = latestPositions.find(p => p.satId === Number(m[1]));
          if (s) updateCoverageCircle(s);
        }
      }
    }
  };
}

// ── Polling fallback (used on Vercel / serverless) ───────────────
let pollingStarted = false;
function startPollingFallback() {
  if (pollingStarted) return;
  pollingStarted = true;
  appendStatus('polling');

  async function poll() {
    try {
      const res = await fetch('/api/positions');
      if (!res.ok) return;
      const data = await res.json();
      latestPositions = data.positions || [];
      latestPositions.forEach(upsertSatellite);
    } catch (_) {}
  }
  poll();
  setInterval(poll, 2000);
}

function appendStatus(msg) {
  statusEl.textContent += ' | ' + msg;
}

// ── Entity selection ─────────────────────────────────────────────
viewer.selectedEntityChanged.addEventListener((ent) => {
  if (!ent) { updateCoverageCircle(null); return; }
  const m = /^sat-(\d+)$/.exec(ent.id || '');
  if (!m) return;
  const s = latestPositions.find(p => p.satId === Number(m[1]));
  if (s) { infoEl.innerHTML = formatInfo(s); updateCoverageCircle(s); }
});

// ── Boot ─────────────────────────────────────────────────────────
loadCatalog()
  .then(startSocket)
  .catch(err => {
    statusEl.textContent = `Init error: ${err.message}`;
    startPollingFallback();
  });
</script>
</body>
</html>

  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:system-ui,sans-serif; }
    #cesiumContainer { width:100%; height:100%; }
    #ui { position:absolute; top:10px; right:10px; width:380px; max-height:95vh; overflow:auto; background:rgba(8,14,25,.92); color:#e6eefc; padding:10px; border-radius:10px; z-index:9; }
    input,select,button { width:100%; margin:4px 0; padding:6px; border-radius:6px; border:1px solid #334; background:#0f1629; color:#e6eefc; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th, td { border-bottom:1px solid #223; padding:4px; text-align:left; }
    .tiny{font-size:11px; color:#9fb1d8;}
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="ui">
    <h3>Live Satellite Module</h3>
    <div id="status" class="tiny">Connecting...</div>
    <input id="filter" placeholder="Filter by name/country/type/category" />
    <select id="satSelect"></select>
    <button id="loadTrack">Load Ground Track</button>
    <input id="obsLat" placeholder="Observer latitude" value="28.6139" />
    <input id="obsLon" placeholder="Observer longitude" value="77.2090" />
    <button id="predictPasses">Predict 24h Passes</button>
    <div id="passOut" class="tiny"></div>
    <h4>Satellite Info</h4>
    <div id="info" class="tiny">Click a marker.</div>
    <h4>Catalog</h4>
    <table><thead><tr><th>Name</th><th>Country</th><th>Type</th><th>Category</th></tr></thead><tbody id="catalog"></tbody></table>
  </div>

<script>
const viewer = new Cesium.Viewer('cesiumContainer', {
  timeline: false,
  animation: false,
  selectionIndicator: true,
  shouldAnimate: true,
});

const entities = new Map();
let catalog = [];
let latestPositions = [];

const statusEl = document.getElementById('status');
const filterEl = document.getElementById('filter');
const selectEl = document.getElementById('satSelect');
const catalogEl = document.getElementById('catalog');
const infoEl = document.getElementById('info');
const passOutEl = document.getElementById('passOut');

document.getElementById('loadTrack').onclick = async () => {
  const norad = Number(selectEl.value);
  if (!norad) return;
  const res = await fetch(`/api/ground-track?norad=${norad}&minutes=100&stepSec=60`);
  const data = await res.json();
  const positions = data.points.map(p => Cesium.Cartesian3.fromDegrees(p.lon, p.lat, p.alt * 1000));
  viewer.entities.add({
    id: `track-${norad}`,
    polyline: { positions, width: 2, material: Cesium.Color.CYAN }
  });
};

document.getElementById('predictPasses').onclick = async () => {
  const norad = Number(selectEl.value);
  const lat = Number(document.getElementById('obsLat').value);
  const lon = Number(document.getElementById('obsLon').value);
  const res = await fetch(`/api/passes?norad=${norad}&lat=${lat}&lon=${lon}&hours=24`);
  const data = await res.json();
  passOutEl.innerHTML = (data.passes || []).slice(0, 10).map(p => `Start ${p.start}<br/>Peak ${p.peakTs} (${p.peakDistanceKm.toFixed(1)} km)<br/>End ${p.end}<br/><br/>`).join('') || 'No passes found in 24h';
};

function upsertSatellite(s) {
  const key = s.satId;
  const pos = Cesium.Cartesian3.fromDegrees(s.lon, s.lat, s.alt * 1000);
  if (!entities.has(key)) {
    const e = viewer.entities.add({
      id: `sat-${key}`,
      name: `${s.name} (${s.satId})`,
      position: pos,
      point: { pixelSize: 4, color: Cesium.Color.YELLOW },
      description: `Country: ${s.country}<br/>Type: ${s.type}<br/>Category: ${s.category}<br/>Orbit: ${s.orbitClass}`
    });
    entities.set(key, e);
  } else {
    entities.get(key).position = pos;
  }
}

function renderCatalog() {
  const q = filterEl.value.toLowerCase();
  const filtered = catalog.filter(s => `${s.name} ${s.country} ${s.object_type} ${s.category}`.toLowerCase().includes(q)).slice(0, 400);
  catalogEl.innerHTML = filtered.map(s => `<tr data-id="${s.sat_id}"><td>${s.name}</td><td>${s.country || ''}</td><td>${s.object_type || ''}</td><td>${s.category}</td></tr>`).join('');
  selectEl.innerHTML = filtered.slice(0, 1000).map(s => `<option value="${s.sat_id}">${s.name} (${s.sat_id})</option>`).join('');
  for (const tr of catalogEl.querySelectorAll('tr')) {
    tr.onclick = () => {
      const satId = Number(tr.dataset.id);
      const s = latestPositions.find(p => p.satId === satId);
      if (s) {
        infoEl.innerHTML = `<b>${s.name}</b><br/>Lat ${s.lat.toFixed(2)} Lon ${s.lon.toFixed(2)} Alt ${s.alt.toFixed(1)} km<br/>Vel ${s.velocityKms.toFixed(3)} km/s<br/>Footprint ${s.footprintKm.toFixed(1)} km<br/>Countries: ${(s.countries || []).slice(0,8).join(', ')}`;
        viewer.flyTo(entities.get(s.satId));
      }
    };
  }
}
filterEl.oninput = renderCatalog;

async function loadCatalog() {
  const res = await fetch('/api/catalog');
  const data = await res.json();
  catalog = data.satellites || [];
  renderCatalog();
  statusEl.textContent = `Catalog: ${data.count} satellites, updated ${data.updatedAt}`;
}

function startSocket() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const socket = new WebSocket(`${proto}://${location.host}/ws`);
  socket.onopen = () => statusEl.textContent = `${statusEl.textContent} | WebSocket connected`;
  socket.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type !== 'positions') return;
    latestPositions = msg.positions;
    for (const sat of msg.positions) upsertSatellite(sat);
  };
  socket.onerror = () => startPollingFallback();
  socket.onclose = () => startPollingFallback();
}

let pollStarted = false;
function startPollingFallback() {
  if (pollStarted) return;
  pollStarted = true;
  statusEl.textContent = `${statusEl.textContent} | polling fallback`;
  setInterval(async () => {
    const res = await fetch('/api/positions');
    const data = await res.json();
    latestPositions = data.positions || [];
    for (const sat of latestPositions) upsertSatellite(sat);
  }, 1000);
}

viewer.selectedEntityChanged.addEventListener((ent) => {
  if (!ent) return;
  const m = /sat-(\d+)/.exec(ent.id);
  if (!m) return;
  const satId = Number(m[1]);
  const s = latestPositions.find(p => p.satId === satId);
  if (s) infoEl.innerHTML = `<b>${s.name}</b><br/>Lat ${s.lat.toFixed(2)} Lon ${s.lon.toFixed(2)} Alt ${s.alt.toFixed(1)} km<br/>Velocity ${s.velocityKms.toFixed(3)} km/s<br/>Category ${s.category}<br/>Visible countries: ${(s.countries || []).slice(0,10).join(', ')}`;
});

loadCatalog().then(startSocket).catch((e)=>{ statusEl.textContent = `Init error: ${e.message}`; startPollingFallback(); });
</script>
</body>
</html>
